# Application bindings
# use wev command to check key inputs
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser --blank-window
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, zen-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, C, Discord, exec, omarchy-launch-or-focus vesktop
bindd = SUPER SHIFT, G, Steam, exec, omarchy-launch-or-focus steam
#bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop-beta"
#bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, W, Joplin, exec, omarchy-launch-or-focus ^joplin$ "uwsm-app -- ~/.local/share/applications/appimages/Joplin-3.5.13.AppImage"
bindd = SUPER SHIFT, SLASH, Passwords, exec, omarchy-launch-or-focus keepassxc "uwsm-app -- keepassxc"
bindd = SUPER SHIFT, S, Audio, exec, omarchy-launch-audio

# Unbind defaults that conflict
unbind = SUPER, J
unbind = SUPER, K
unbind = SUPER, L
# Unused
unbind = , XF86TouchpadToggle
unbind = , XF86TouchpadOff
unbind = , XF86TouchpadOn
unbind = , XF86KbdLightOnOff
unbind = , XF86KbdBrightnessUp
unbind = , XF86KbdBrightnessDown

# bindd = SUPER SHIFT, L, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle

# Brightness controls
bindd = , F23,      Brightness down 5%, exec, /home/ryha/dotfiles/bin/omarchy-brightness-display -5
bindd = , F24,      Brightness up 5%, exec, /home/ryha/dotfiles/bin/omarchy-brightness-display +5
bindd = SHIFT, F23, Brightness down 25%, exec, /home/ryha/dotfiles/bin/omarchy-brightness-display -25
bindd = SHIFT, F24, Brightness up 25%, exec, /home/ryha/dotfiles/bin/omarchy-brightness-display +25

# Crosshair
bindd = , F19, Show green crosshair, exec, pkill crosshair; /home/ryha/.local/bin/crosshair/crosshair --image /home/ryha/.local/bin/crosshair/cross.png --gamma 1
#F18
bindd = , XF86Launch9, Show dot crosshair, exec, pkill crosshair; /home/ryha/.local/bin/crosshair/crosshair --image /home/ryha/.local/bin/crosshair/dot.png --gamma 1
#F13
bindd = , XF86Tools, Kill crosshair, exec, pkill crosshair

# Show Keybindings replacement
bindd = SUPER, I, Show key bindings, exec, omarchy-menu-keybindings

# Window focus (vim keys)
bindd = SUPER, H, Move focus left, movefocus, l
bindd = SUPER, J, Move focus down, movefocus, d
bindd = SUPER, K, Move focus up, movefocus, u
bindd = SUPER, L, Move focus right, movefocus, r

# Move window (vim keys)
bindd = SUPER SHIFT, H, Move Window Left, movewindow, l
bindd = SUPER SHIFT, J, Move Window Down, movewindow, d
bindd = SUPER SHIFT, K, Move Window Up, movewindow, u
bindd = SUPER SHIFT, L, Move Window Right, movewindow, r

# Workspace navigation
# Create new workspace
bindd = SUPER, A,       Switch workspace left, workspace, r-1 #e-1 for only active workspaces
bindd = SUPER, D,       Switch workspace right, workspace, r+1
bindd = SUPER SHIFT, A, Move window workspace left, movetoworkspace, r-1
bindd = SUPER SHIFT, D, Move window workspace right, movetoworkspace, r+1
